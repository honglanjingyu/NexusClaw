<!-- web/login.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --danger-color: #ef4444;
            --dark-bg: #1a1a2e;
            --dark-card: #16213e;
            --dark-text: #e2e8f0;
            --dark-text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: var(--dark-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-card {
            background: var(--dark-card);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo i {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 12px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .logo p {
            color: var(--dark-text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--dark-text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--dark-text);
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group input::placeholder {
            color: var(--dark-text-secondary);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger-color);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 20px;
            color: var(--danger-color);
            font-size: 14px;
            text-align: center;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 20px;
            color: #10b981;
            font-size: 14px;
            text-align: center;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--dark-text-secondary);
        }

        .info-text a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .info-text a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <h1>AI Agent</h1>
                <p>智能助手，随时为你服务</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>

            <div id="loginPane" class="tab-pane active">
                <form id="loginForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn" id="loginBtn">登录</button>
                </form>
            </div>

            <div id="registerPane" class="tab-pane">
                <form id="registerForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="registerUsername" placeholder="用户名 (3-50个字符)" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="registerPassword" placeholder="密码 (至少6个字符)" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="registerConfirmPassword" placeholder="请再次输入密码" autocomplete="off">
                    </div>
                    <button type="submit" class="btn" id="registerBtn">注册</button>
                </form>
            </div>

            <div class="info-text">
                登录即表示同意我们的服务条款
            </div>
        </div>
    </div>

    <script>
        // API 基础地址
        const API_BASE = '/api/auth';

        // DOM 元素
        const loginPane = document.getElementById('loginPane');
        const registerPane = document.getElementById('registerPane');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');

        // 显示消息
        function showMessage(paneId, message, isError = true) {
            const pane = document.getElementById(paneId);
            const existingMsg = pane.querySelector('.error-message, .success-message');
            if (existingMsg) existingMsg.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = isError ? 'error-message' : 'success-message';
            msgDiv.textContent = message;
            pane.insertBefore(msgDiv, pane.firstChild);

            setTimeout(() => {
                if (msgDiv.parentNode) msgDiv.remove();
            }, 3000);
        }

        // 显示加载状态
        function setLoading(btn, isLoading) {
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> 处理中...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.id === 'loginBtn' ? '登录' : '注册';
            }
        }

        // 保存 token
        function saveToken(token, userId, username) {
            localStorage.setItem('agent_token', token);
            localStorage.setItem('agent_user_id', userId);
            localStorage.setItem('agent_username', username);
        }

        // 清除 token
        function clearToken() {
            localStorage.removeItem('agent_token');
            localStorage.removeItem('agent_user_id');
            localStorage.removeItem('agent_username');
        }

        // 处理登录
        async function handleLogin(e) {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username) {
                showMessage('loginPane', '请输入用户名');
                return;
            }
            if (!password) {
                showMessage('loginPane', '请输入密码');
                return;
            }

            setLoading(loginBtn, true);

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    saveToken(data.token, data.user_id, data.username);
                    showMessage('loginPane', data.message, false);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage('loginPane', data.message);
                }
            } catch (error) {
                showMessage('loginPane', '网络错误: ' + error.message);
            } finally {
                setLoading(loginBtn, false);
            }
        }

        // 处理注册
        async function handleRegister(e) {
            e.preventDefault();

            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            if (!username) {
                showMessage('registerPane', '请输入用户名');
                return;
            }
            if (username.length < 3 || username.length > 50) {
                showMessage('registerPane', '用户名长度应为 3-50 个字符');
                return;
            }
            if (!password) {
                showMessage('registerPane', '请输入密码');
                return;
            }
            if (password.length < 6) {
                showMessage('registerPane', '密码长度至少为 6 个字符');
                return;
            }
            if (password !== confirmPassword) {
                showMessage('registerPane', '两次输入的密码不一致');
                return;
            }

            setLoading(registerBtn, true);

            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('registerPane', data.message, false);
                    setTimeout(() => {
                        // 切换到登录标签页
                        document.querySelector('.tab-btn[data-tab="login"]').click();
                        document.getElementById('loginUsername').value = username;
                        document.getElementById('loginPassword').focus();
                    }, 1500);
                } else {
                    showMessage('registerPane', data.message);
                }
            } catch (error) {
                showMessage('registerPane', '网络错误: ' + error.message);
            } finally {
                setLoading(registerBtn, false);
            }
        }

        // 切换标签页
        function switchTab(tabName) {
            if (tabName === 'login') {
                loginPane.classList.add('active');
                registerPane.classList.remove('active');
            } else {
                loginPane.classList.remove('active');
                registerPane.classList.add('active');
            }

            tabBtns.forEach(btn => {
                if (btn.dataset.tab === tabName) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // 清除输入框中的消息提示
            const messages = document.querySelectorAll('.error-message, .success-message');
            messages.forEach(msg => msg.remove());
        }

        // 检查是否已登录
        function checkAlreadyLoggedIn() {
            const token = localStorage.getItem('agent_token');
            if (token) {
                window.location.href = '/';
            }
        }

        // 事件绑定
        loginForm.addEventListener('submit', handleLogin);
        registerForm.addEventListener('submit', handleRegister);
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // 按 Enter 键提交
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin(e);
        });
        document.getElementById('registerConfirmPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleRegister(e);
        });

        // 检查登录状态
        checkAlreadyLoggedIn();
    </script>
</body>
</html>
